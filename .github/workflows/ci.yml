name: COBOL Validator CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Validator Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Run validator tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run benchmark report
        run: python validator/run_benchmark.py --out REPORT.md

      - name: Verify REPORT.md generated
        run: |
          if [ ! -f REPORT.md ]; then
            echo "REPORT.md was not generated"
            exit 1
          fi
          echo "REPORT.md generated successfully"
          head -30 REPORT.md

  lint:
    name: "Ruff Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check validator/ tests/ --ignore E402
